<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te Amo Tomi ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3em;
            color: #e74c3c;
            margin-bottom: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .heart {
            font-size: 4em;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            margin: 20px 0;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        p {
            font-size: 1.2em;
            color: #333;
            margin: 20px 0;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            flex: 1;
            min-width: 120px;
        }

        .btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
        }

        .btn-no {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
            flex: 1;
            min-width: 120px;
            position: relative;
        }

        .btn-no:hover {
            transform: translate(10px, -10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .message {
            display: none;
            font-size: 2em;
            color: #e74c3c;
            margin-top: 30px;
            animation: popIn 0.6s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 100;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>¿Me Amas? 💕</h1>
        <div class="heart">❤️</div>
        <p>Tomi, quería preguntarte algo importante...</p>
        <p style="font-size: 1.1em; color: #667eea; font-weight: bold;">¿Aceptarías ser mi amor por siempre?</p>
        
        <div class="buttons">
            <button class="btn-yes" onclick="clickYes()">SÍ ✨</button>
            <button class="btn-no" onclick="clickNo()">No 😅</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        // Crear estrellas de fondo
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Crear confeti
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = ['#e74c3c', '#f39c12', '#f1c40f', '#2ecc71', '#3498db'][Math.floor(Math.random() * 5)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function clickYes() {
            createConfetti();
            const message = document.getElementById('message');
            message.textContent = '¡Te amo más que nada en el mundo! 💕✨';
            message.style.display = 'block';
            
            // Cambiar botones
            document.querySelector('.btn-yes').disabled = true;
            document.querySelector('.btn-no').disabled = true;
            document.querySelector('.btn-yes').style.opacity = '0.7';
            document.querySelector('.btn-no').style.opacity = '0.7';
        }

        function clickNo() {
            const btn = document.querySelector('.btn-no');
            const randomX = (Math.random() - 0.5) * 200;
            const randomY = (Math.random() - 0.5) * 200;
            btn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        createStars();
    </script>
</body>
</html>
